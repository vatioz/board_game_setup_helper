name: Build and push image to ACR

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set IMAGE_TAG (zero-padded 3 digits)
        run: |
          printf -v PAD '%03d' "$GITHUB_RUN_NUMBER"
          echo "IMAGE_TAG=$PAD" >> $GITHUB_ENV

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/bgsetup:${{ env.IMAGE_TAG }}
            ${{ secrets.ACR_LOGIN_SERVER }}/bgsetup:latest
